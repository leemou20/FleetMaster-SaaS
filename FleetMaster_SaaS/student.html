<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Tracker | Dynamic AI Speed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #e0e0e0; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; cursor: crosshair; }
        
        /* SETUP MODE BANNER */
        #setup-banner { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 2000; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 85%; max-width: 350px; border: 2px solid #3388ff;}
        #setup-banner h3 { margin: 0 0 10px 0; color: #3388ff; }
        #setup-banner p { margin: 0 0 15px 0; font-size: 13px; color: #555; }
        .vehicle-select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-weight: bold; font-family: 'Inter'; border: 1px solid #ccc; }
        .btn-lock { background: #00b09b; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }

        /* TRACKING MODE UI */
        #tracking-ui { display: none; }
        .status-card { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 15px 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: space-between; width: 85%; max-width: 350px; }
        .status-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { height: 10px; width: 10px; background-color: #ff9800; border-radius: 50%; }
        .status-dot.live { background-color: #00e676; box-shadow: 0 0 8px #00e676; }
        .status-dot.offline { background-color: #ff416c; box-shadow: 0 0 8px #ff416c; }
        .status-time { font-size: 13px; color: #555; margin: 0; font-weight: 700;}
        .student-badge { background: #f8f9fa; color: #7f8c8d; padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 11px; border: 1px solid #ccc; text-align: right; margin-bottom: 5px; display: none; white-space: nowrap; }
        .eta-badge { background: #e8f8f5; color: #00b09b; padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 12px; border: 1px solid #00b09b; text-align: right; white-space: nowrap; }
        .speed-badge { background: #fff3e0; color: #e65100; font-size: 10px; padding: 2px 6px; border-radius: 4px; display: block; margin-top: 4px; }

        /* TIMELINE */
        .timeline-card { position: absolute; bottom: 30px; left: 5%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 350px; border: 1px solid #e0e0e0; display: flex; flex-direction: column; max-height: 50vh; }
        .timeline-header { padding: 15px; background: #f8f9fa; border-top-left-radius: 15px; border-top-right-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; cursor: grab;}
        .timeline-header:active { cursor: grabbing; }
        .timeline-title { margin: 0; font-size: 14px; font-weight: 700; color: #333; }
        #timeline-content { padding: 15px; overflow-y: auto; }
        
        .stop-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; font-weight: 600; color: #555; }
        .stop-left { display: flex; align-items: center; gap: 10px; }
        .stop-eta { font-size: 11px; background: #f0f0f0; padding: 3px 6px; border-radius: 4px; color: #666; }
        
        .passed { color: #a0a0a0; text-decoration: line-through; }
        .current { color: #00b09b; font-weight: 800; font-size: 14px; }
        .upcoming { color: #222; }

        .custom-bus-icon { font-size: 30px; text-shadow: 0px 4px 10px rgba(0,0,0,0.4); text-align: center; line-height: 30px; }
        .toggle-btn { background: #e0e0e0; border: none; border-radius: 5px; width: 30px; height: 30px; font-weight: bold; cursor: pointer; }

        /* 🔄 THE PLACEBO SYNC BUTTON */
        @keyframes spinAnim { 100% { transform: rotate(360deg); } }
        .spin-active { animation: spinAnim 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sync-btn { position: absolute; top: 90px; right: 15px; z-index: 1000; background: white; border: 2px solid #00b09b; border-radius: 50%; width: 45px; height: 45px; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s; color: #00b09b; }
        .sync-btn:active { transform: scale(0.9); background: #f4f7f6; }

        /* 📱 MOBILE RESPONSIVE UPGRADE */
        @media (max-width: 600px) {
            #setup-banner, .status-card, .timeline-card { width: 92%; max-width: none; left: 4%; transform: none; box-sizing: border-box; }
            #setup-banner { top: 10px; padding: 15px; }
            .status-card { top: 10px; padding: 10px 15px; }
            .timeline-card { bottom: 15px; }
            .timeline-header { padding: 10px 15px; }
            .status-left { gap: 5px; }
            .status-time { font-size: 11px; }
            .eta-badge { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <div id="setup-banner">
        <h3>📡 Synchronizing Portal</h3>
        <p id="sync-status" style="font-weight: 600; color: #00b09b;">Identifying student and downloading assigned route...</p>
    </div>

    <div id="tracking-ui">
        <div class="status-card">
            <div class="status-left">
                <div class="status-dot" id="indicator"></div>
                <div>
                    <p class="status-time" id="time-text">Waiting...</p>
                    <span class="speed-badge" id="live-speed">Speed: 0 km/h</span>
                </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end;">
                <div class="student-badge" id="student-status-badge">Checking Status...</div>
                <div class="eta-badge" id="eta-display">ETA: Calc...</div>
            </div>
        </div>

        <button class="sync-btn" id="manual-sync-btn" onclick="triggerSmartSync()" title="Force Live Update">🔄</button>

        <div class="timeline-card" id="draggablePanel">
            <div class="timeline-header" id="panelHeader">
                <h3 class="timeline-title">📍 Live Route Status <span style="font-size:10px; color:#a0aab2; margin-left:8px;">v3.0</span></h3>
                <button class="toggle-btn" onclick="togglePanel()">—</button>
            </div>
            <div id="timeline-content">
                <div id="timeline-list"></div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // ⚠️ PASTE YOUR BRAND NEW GetLiveGPS LAMBDA URL HERE:
        const baseApiUrl = 'https://tqsrfu3zkdcvj3qdsb4uyfxfgi0trygr.lambda-url.ap-south-1.on.aws/'; 
        
        let map; let busMarker; let trackingInterval;
        let routeStops = []; let routeCoordinates = []; 
        let roadCoordinates = []; 
        let polylineLayer;
        let isTripComplete = false;

        // NEW: Dynamic Speed Tracking Variables
        let lastLat = null;
        let lastLng = null;
        let lastPingTime = null;
        // 🚨 V2.0 FIXES: Starts at exactly 0. Requires 2 pings. Tracks dead data.
        let currentDynamicSpeedKmH = 0; 
        let pingCount = 0; 
        let stagnantTimer = 0;

        const busIcon = L.divIcon({ html: '🔴', className: 'custom-bus-icon', iconSize: [30, 30], iconAnchor: [15, 15] });

        // ⚠️ NEW API ENDPOINTS FOR SMART SYNC
        const GET_STUDENTS_URL = 'https://mp3sdcs26o7o5sakc4x7x2o2mq0vcmur.lambda-url.ap-south-1.on.aws/';
        const GET_ROUTES_URL = 'https://dhkoidf5cdfqw6uavdp2hdvisa0pddun.lambda-url.ap-south-1.on.aws/';
        const REGISTRY_API_URL = 'https://4irmjjsu3fymjnivjytbf35hc40hkrqv.lambda-url.ap-south-1.on.aws/';
        
        let targetBusId = null; 
        let targetStop = null; 
        let myHomeLat = null; 
        let myHomeLng = null;
        let myVehicleType = 'bus'; 

        // 🚨 V3.0 LIFECYCLE VARIABLES
        let studentRollNumber = null;
        let targetStopLat = null;
        let targetStopLng = null;
        let studentStatus = 'unmarked';
        let hasSafelyReached = false;

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([11.7767, 77.7925], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map); 
            
            // Note: Removed the map click listener because Parents shouldn't build routes!
        }

        // --- 🚀 THE 20-YEAR CTO SMART SYNC ENGINE ---
        async function autoInitializeParentPortal() {
            const statusText = document.getElementById('sync-status');
            
            // 1. Who is logged in?
            let userId = localStorage.getItem('fleetmaster_user_id');
            if(!userId) {
                // Fallback for testing if they didn't come from index.html
                userId = prompt("Security Check: Enter Student Roll Number to sync map:");
                if(!userId) { statusText.innerText = "Authentication Failed."; return; }
            }

            try {
                // 2. Fetch all students to find THIS student
                statusText.innerText = "Locating student assignment...";
                let res = await fetch(GET_STUDENTS_URL);
                let data = await res.json();
                let allStudents = data.body ? (typeof data.body === 'string' ? JSON.parse(data.body) : data.body) : (typeof data === 'string' ? JSON.parse(data) : data);
                
                const myStudent = allStudents.find(s => s.roll === userId);
                if(!myStudent) { 
                    statusText.innerText = `Student ID ${userId} not found in database. Contact Admin.`; 
                    statusText.style.color = "#ff416c"; return; 
                }
                
                targetBusId = myStudent.bus_id; // 🧠 WE FOUND THEIR BUS!
                myHomeLat = myStudent.home_lat; // 🏠 SAVED HOME COORDS
                myHomeLng = myStudent.home_lng;
                studentRollNumber = myStudent.roll; // 🚨 V3.0 Save Roll Number
                
                // 🌅 Time-of-Day Routing Logic (Before 2:00 PM = Morning, After = Evening)
                const currentHour = new Date().getHours();
                targetStop = currentHour < 14 ? myStudent.morning_stop : myStudent.evening_stop;

                // 🛺 Fetch Vehicle Type from Registry
                statusText.innerText = `Fetching vehicle details...`;
                let regRes = await fetch(REGISTRY_API_URL);
                let regData = await regRes.json();
                let allBuses = regData.body ? (typeof regData.body === 'string' ? JSON.parse(regData.body) : regData.body) : (typeof regData === 'string' ? JSON.parse(regData) : regData);
                const myBus = allBuses.find(b => b.bus_id === targetBusId);
                if(myBus && myBus.vehicle_type) myVehicleType = myBus.vehicle_type;

                // 3. Fetch routes to find THIS BUS'S route
                statusText.innerText = `Downloading route for ${targetBusId}...`;
                res = await fetch(GET_ROUTES_URL);
                data = await res.json();
                let allRoutes = data.body ? (typeof data.body === 'string' ? JSON.parse(data.body) : data.body) : (typeof data === 'string' ? JSON.parse(data) : data);
                
                // 🛡️ THE FILTER: Get the specific route for their assigned bus
                const myRoute = allRoutes.find(r => r.assigned_bus === targetBusId && r.stops && r.stops.length >= 2);
                
                if(!myRoute) { 
                    statusText.innerText = `No route has been drawn by Admin for ${targetBusId} yet.`; 
                    statusText.style.color = "#ff416c"; return; 
                }

                // 4. Draw the cloud stops on the map
                routeStops = myRoute.stops;
                routeCoordinates = [];
                routeStops.forEach(stop => {
                    routeCoordinates.push([stop.lat, stop.lng]);
                    L.circleMarker([stop.lat, stop.lng], { radius: 6, color: '#3388ff', fillColor: 'white', fillOpacity: 1 })
                     .addTo(map).bindPopup(stop.name).openPopup();
                });
                
                // 🚨 V3.0 Extract EXACT coordinates of the assigned stop for geofencing
                const exactStop = routeStops.find(s => s.name === targetStop);
                if (exactStop) {
                    targetStopLat = exactStop.lat;
                    targetStopLng = exactStop.lng;
                }
                
                // Zoom map to fit the downloaded route
                map.fitBounds(routeCoordinates, { padding: [50, 50] });
                
                // 5. Automatically start the physics tracking engine!
                statusText.innerText = "Route synced. Starting Live Radar...";
                setTimeout(startTrackingMode, 1000); // 1 second delay so they see the success message
                
            } catch (e) {
                console.error(e);
                statusText.innerText = "Network Error during synchronization.";
                statusText.style.color = "#ff416c";
            }
        }
        // ------------------------------

        async function fetchRoadRoute() {
            const coordsString = routeStops.map(s => `${s.lng},${s.lat}`).join(';');
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`;
            
            try {
                const response = await fetch(osrmUrl);
                const data = await response.json();
                if (data.routes && data.routes.length > 0) {
                    roadCoordinates = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                } else { roadCoordinates = routeCoordinates; }
            } catch (e) { roadCoordinates = routeCoordinates; }
        }

        async function startTrackingMode() {
            if (routeStops.length < 2) return;

            // 1. Force the DYNAMIC Vehicle Icon!
            if (myVehicleType === 'van') busIcon.options.html = '🚐';
            else if (myVehicleType === 'auto') busIcon.options.html = '🛺';
            else if (myVehicleType === 'car') busIcon.options.html = '🚗';
            else busIcon.options.html = '🚌';

            // 2. Snap to roads
            await fetchRoadRoute();

            // 3. Swap UI
            document.getElementById('setup-banner').style.display = 'none';
            document.getElementById('tracking-ui').style.display = 'block';
            map.getContainer().style.cursor = ''; 

            // 4. Draw the Blue Route Line
            polylineLayer = L.polyline(roadCoordinates, { color: '#1e88e5', weight: 6, opacity: 0.9 }).addTo(map);

            // 5. 📍 HIGHLIGHT THE STUDENT'S SPECIFIC STOP & HOME
            routeStops.forEach(stop => {
                if(stop.name === targetStop) {
                    L.circleMarker([stop.lat, stop.lng], { radius: 10, color: '#ff9800', fillColor: '#ff9800', fillOpacity: 0.9 })
                     .addTo(map).bindPopup("<b style='color:#ff9800;'>📍 YOUR ASSIGNED STOP</b><br>" + stop.name).openPopup();
                }
            });

            if (myHomeLat && myHomeLng) {
                const houseIcon = L.divIcon({ html: '🏠', className: 'custom-bus-icon', iconSize: [30, 30], iconAnchor: [15, 15] });
                L.marker([myHomeLat, myHomeLng], {icon: houseIcon}).addTo(map).bindPopup("<b>🏠 Your Home</b>").openPopup();
            }

            // 6. Boot the Physics Engine
            renderTimeline(-1, 0, 0);
            fetchBusLocation();
            fetchAttendanceStatus(); // 🚨 V3.0 Immediate Check
            trackingInterval = setInterval(fetchBusLocation, 5000);
            setInterval(fetchAttendanceStatus, 10000); // 🚨 V3.0 Poll Attendance every 10s
        }

        // 🚨 V3.0 FETCH ATTENDANCE ENGINE
        async function fetchAttendanceStatus() {
            if (hasSafelyReached || !studentRollNumber) return;
            try {
                let res = await fetch(GET_STUDENTS_URL);
                let data = await res.json();
                let allStudents = data.body ? (typeof data.body === 'string' ? JSON.parse(data.body) : data.body) : (typeof data === 'string' ? JSON.parse(data) : data);
                
                const me = allStudents.find(s => s.roll === studentRollNumber);
                if (me) {
                    studentStatus = me.status;
                    const badge = document.getElementById('student-status-badge');
                    badge.style.display = 'block';

                    if (studentStatus === 'absent') {
                        badge.innerText = '⚠️ Marked Absent';
                        badge.style.background = '#fff4f6'; badge.style.color = '#ff416c'; badge.style.borderColor = '#ff416c';
                    } else if (studentStatus === 'present') {
                        badge.innerText = '🟢 Boarded Bus';
                        badge.style.background = '#f4fff8'; badge.style.color = '#00b09b'; badge.style.borderColor = '#00b09b';
                    } else {
                        badge.innerText = '⏳ Not Boarded Yet';
                        badge.style.background = '#f8f9fa'; badge.style.color = '#7f8c8d'; badge.style.borderColor = '#ccc';
                    }
                }
            } catch(e) { console.log("Attendance Sync Error", e); }
        }

        function calculateTimeStr(distanceMeters, isOffline) {
            if (isOffline) return "--";
            if (currentDynamicSpeedKmH < 2 || pingCount < 2) return "Awaiting Movement";

            const distanceKm = distanceMeters / 1000;
            const timeHours = distanceKm / currentDynamicSpeedKmH;
            const totalMins = timeHours * 60;
            
            if (totalMins > 600) return "Calculating...";

            const mins = Math.floor(totalMins);
            const secs = Math.round((totalMins - mins) * 60);
            
            if (mins === 0 && secs < 30) return "Arriving";
            if (mins > 60) {
                const hrs = Math.floor(mins / 60);
                const remMins = mins % 60;
                return `${hrs}h ${remMins}m`;
            }
            return `${mins}m ${secs}s`;
        }

        function updateTimelineLogic(busLat, busLng, isOffline) {
            if (isTripComplete || hasSafelyReached) return;

            // 🚨 V3.0 GEOFENCING: Did they reach their target stop?
            if (studentStatus === 'present' && targetStopLat && targetStopLng) {
                const distToDropoff = map.distance([busLat, busLng], [targetStopLat, targetStopLng]);
                if (distToDropoff < 40) { // 40 meter arrival radius
                    hasSafelyReached = true;
                    isTripComplete = true; // Stop ETA calculations
                    
                    const badge = document.getElementById('student-status-badge');
                    badge.innerText = '🎉 SAFELY REACHED DESTINATION';
                    badge.style.background = '#f4fff8'; badge.style.color = '#00e676'; badge.style.borderColor = '#00e676';
                    
                    document.getElementById('eta-display').innerText = "Journey Complete";
                    document.getElementById('eta-display').style.color = "#00e676";
                    document.getElementById('eta-display').style.borderColor = "#00e676";
                    
                    document.getElementById('live-speed').innerText = "Stopped";
                    document.getElementById('indicator').className = 'status-dot';
                    
                    renderTimeline(routeStops.length, busLat, busLng, false); 
                    
                    // Alert the parent dynamically!
                    setTimeout(() => alert("🎉 Your child has safely reached their destination!"), 500);
                    return;
                }
            }

            let closestStopIndex = 0; let shortestDistance = Infinity;

            routeStops.forEach((stop, index) => {
                const distance = map.distance([busLat, busLng], [stop.lat, stop.lng]);
                if (distance < shortestDistance) { shortestDistance = distance; closestStopIndex = index; }
            });

            const finalStop = routeStops[routeStops.length - 1];
            if (map.distance([busLat, busLng], [finalStop.lat, finalStop.lng]) < 40) {
                isTripComplete = true;
                document.getElementById('eta-display').innerText = "🎉 TRIP COMPLETED";
                document.getElementById('eta-display').style.color = "#00e676";
                document.getElementById('eta-display').style.borderColor = "#00e676";
                document.getElementById('live-speed').innerText = "Stopped";
                document.getElementById('indicator').className = 'status-dot';
                renderTimeline(routeStops.length, busLat, busLng, false); 
                return;
            }

            renderTimeline(closestStopIndex, busLat, busLng, isOffline);

            const distToFinal = map.distance([busLat, busLng], [finalStop.lat, finalStop.lng]);
            const etaBadge = document.getElementById('eta-display');
            
            // 🚨 V2.0 UI UPDATE: Strict Offline & Waiting rules
            if (isOffline) {
                etaBadge.innerText = "Trip Offline";
                etaBadge.style.color = "#ff416c"; etaBadge.style.borderColor = "#ff416c";
            } else if (currentDynamicSpeedKmH < 2 || pingCount < 2) {
                etaBadge.innerText = "Awaiting Movement";
                etaBadge.style.color = "#ff9800"; etaBadge.style.borderColor = "#ff9800";
            } else {
                etaBadge.innerText = `ETA: ${calculateTimeStr(distToFinal, false)}`;
                etaBadge.style.color = "#00b09b"; etaBadge.style.borderColor = "#00b09b";
            }
        }

        function renderTimeline(currentStopIndex, busLat, busLng, isOffline) {
            const listDiv = document.getElementById('timeline-list');
            listDiv.innerHTML = ''; 

            routeStops.forEach((stop, index) => {
                let icon = '⏳'; let textClass = 'upcoming'; let etaHtml = '';

                if (index < currentStopIndex || isTripComplete) { 
                    icon = '✅'; textClass = 'passed'; 
                } else if (index === currentStopIndex) { 
                    icon = '📍'; textClass = 'current'; 
                } else {
                    const distToStop = map.distance([busLat, busLng], [stop.lat, stop.lng]);
                    etaHtml = `<span class="stop-eta">${calculateTimeStr(distToStop, isOffline)}</span>`;
                }

                listDiv.innerHTML += `
                    <div class="stop-item ${textClass}">
                        <div class="stop-left">
                            <span class="stop-icon">${icon}</span>
                            <span>${stop.name}</span>
                        </div>
                        ${etaHtml}
                    </div>`;
            });
        }

        // 🚦 Prevent Network Traffic Jams
        let isFetchingGPS = false;

        async function fetchBusLocation() {
            if (isTripComplete || isFetchingGPS) return;
            isFetchingGPS = true; // Lock the network

            try {
                const response = await fetch(baseApiUrl);
                const data = await response.json();
                
                let allGps = data.body ? (typeof data.body === 'string' ? JSON.parse(data.body) : data.body) : (typeof data === 'string' ? JSON.parse(data) : data);
                let busList = Array.isArray(allGps) ? allGps : (allGps.Items ? allGps.Items : [allGps]);
                let history = busList.filter(b => String(b.bus_id).trim() === String(targetBusId).trim());
                
                if (history.length === 0) {
                    isFetchingGPS = false; 
                    return; 
                }
                
                history.sort((a, b) => {
                    let timeA = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                    let timeB = b.timestamp ? new Date(b.timestamp).getTime() : 0;
                    return timeB - timeA;
                });
                
                let myBus = history[0];

                if (!myBus || !myBus.lat) {
                    isFetchingGPS = false; 
                    return; 
                }

                const lat = parseFloat(myBus.lat);
                const lng = parseFloat(myBus.lng);
                const newPingTime = myBus.timestamp ? new Date(myBus.timestamp).getTime() : Date.now();
                const newLatLng = [lat, lng];

                pingCount++;

                // 🚨 V3.5 ESCALATION ENGINE (Explicit vs Unexpected Offline)
                let explicitOffline = (myBus.trip_status === "OFFLINE"); // Caught the Kill Signal!

                if (lastPingTime === newPingTime) {
                    stagnantTimer += 5000; // Data stalled
                } else {
                    stagnantTimer = 0; // Fresh data
                }

                const isSignalLost = stagnantTimer >= 120000; // 2+ mins dead
                const isWeakSignal = stagnantTimer >= 15000 && !isSignalLost && !explicitOffline; // 15s to 2 mins
                
                const isTrulyOffline = explicitOffline || isSignalLost;

                if (explicitOffline) {
                    currentDynamicSpeedKmH = 0;
                    document.getElementById('indicator').className = 'status-dot offline';
                    document.getElementById('time-text').innerText = `⚪ Trip Ended`;
                    document.getElementById('live-speed').innerText = `Vehicle Offline`;
                } else if (isSignalLost) {
                    currentDynamicSpeedKmH = 0;
                    document.getElementById('indicator').className = 'status-dot offline';
                    const mins = Math.floor(stagnantTimer / 60000);
                    document.getElementById('time-text').innerText = `🔴 Signal Lost (${mins}m ago)`;
                    document.getElementById('live-speed').innerText = `Speed: 0 km/h`;
                } else if (isWeakSignal) {
                    currentDynamicSpeedKmH = 0;
                    document.getElementById('indicator').className = 'status-dot'; // Reverts to Orange
                    document.getElementById('time-text').innerText = `🟠 Weak Signal...`;
                    document.getElementById('live-speed').innerText = `Reconnecting...`;
                } else {
                    // 🟢 THE PHYSICS ENGINE (Only runs if we have 2 fresh pings!)
                    if (lastLat && lastLng && lastPingTime && pingCount >= 2) {
                        const distMeters = map.distance([lastLat, lastLng], newLatLng);
                        const timeDiffHours = (newPingTime - lastPingTime) / 3600000;
                        if (timeDiffHours > 0 && timeDiffHours < 1) {
                            let instantSpeed = 0;
                            if (distMeters > 15) instantSpeed = (distMeters / 1000) / timeDiffHours;
                            if (instantSpeed > 120) instantSpeed = 120; 
                            currentDynamicSpeedKmH = (currentDynamicSpeedKmH * 0.5) + (instantSpeed * 0.5); 
                            if (currentDynamicSpeedKmH < 2) currentDynamicSpeedKmH = 0;
                        }
                    }
                    
                    document.getElementById('indicator').className = 'status-dot live';
                    document.getElementById('time-text').innerText = `Live Radar Active`;
                    document.getElementById('live-speed').innerText = `Live Speed: ${Math.round(currentDynamicSpeedKmH)} km/h`;
                }

                lastLat = lat; lastLng = lng; lastPingTime = newPingTime;

                // FIX THE MISSING ICON GLITCH & DRAW MARKER
                let displayIcon = '🚌';
                if (myVehicleType === 'van') displayIcon = '🚐';
                else if (myVehicleType === 'auto') displayIcon = '🛺';
                else if (myVehicleType === 'car') displayIcon = '🚗';
                
                const dynamicIcon = L.divIcon({ html: displayIcon, className: 'custom-bus-icon', iconSize: [30, 30], iconAnchor: [15, 15] });

                if (!busMarker) {
                    busMarker = L.marker(newLatLng, {icon: dynamicIcon, zIndexOffset: 1000}).addTo(map);
                } else {
                    busMarker.setLatLng(newLatLng);
                    busMarker.setIcon(dynamicIcon);
                }
                
                // TIMELINE & UNLOCK
                updateTimelineLogic(lat, lng, isOffline);
                isFetchingGPS = false; 

            } catch (error) { 
                console.error("Signal lost", error); 
                isFetchingGPS = false; 
            }
        }

        // Draggable Logic
        function togglePanel() {
            const content = document.getElementById('timeline-content');
            const btn = document.querySelector('.toggle-btn');
            if (content.style.display === 'none') { content.style.display = 'block'; btn.innerText = '—'; } 
            else { content.style.display = 'none'; btn.innerText = '⬜'; }
        }

        const panel = document.getElementById("draggablePanel"); const header = document.getElementById("panelHeader");
        let isDragging = false; let currentX; let currentY; let initialX; let initialY; let xOffset = 0; let yOffset = 0;
        header.addEventListener("mousedown", dragStart); header.addEventListener("touchstart", dragStart, {passive: false});
        document.addEventListener("mouseup", dragEnd); document.addEventListener("touchend", dragEnd);
        document.addEventListener("mousemove", drag); document.addEventListener("touchmove", drag, {passive: false});

        function dragStart(e) {
            initialX = e.type === "touchstart" ? e.touches[0].clientX - xOffset : e.clientX - xOffset;
            initialY = e.type === "touchstart" ? e.touches[0].clientY - yOffset : e.clientY - yOffset;
            if (e.target === header || e.target.tagName === 'H3') isDragging = true;
        }
        function dragEnd() { isDragging = false; }
        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.type === "touchmove" ? e.touches[0].clientX - initialX : e.clientX - initialX;
                currentY = e.type === "touchmove" ? e.touches[0].clientY - initialY : e.clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                panel.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        // 🔄 THE PLACEBO SYNC ENGINE
        function triggerSmartSync() {
            const btn = document.getElementById('manual-sync-btn');
            
            // 1. The Dopamine Spin
            btn.classList.add('spin-active');
            setTimeout(() => btn.classList.remove('spin-active'), 500);

            // 2. The Physical Camera Snap (Illusion of immediate action)
            if (busMarker) {
                map.flyTo(busMarker.getLatLng(), 17, { animate: true, duration: 0.5 });
            }

            // 3. The Safe Network Call (Ignored if already fetching)
            if(!isFetchingGPS) {
                fetchBusLocation();
            }
        }

        initMap(); 
        autoInitializeParentPortal(); 
    </script>
</body>
</html>
